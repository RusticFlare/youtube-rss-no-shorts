<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube → RSS (No Shorts)</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card">
    <h1>YouTube RSS<br><span class="sub">without Shorts</span></h1>
    <p class="hint">
      Paste a YouTube channel URL (e.g.
      <code>https://www.youtube.com/@channelname</code>)
    </p>

    <div class="input-row">
      <input
        id="urlInput"
        type="url"
        placeholder="https://www.youtube.com/@..."
        autocomplete="off"
        spellcheck="false"
      />
      <button id="goBtn">Go</button>
    </div>

    <div id="result" class="result hidden">
      <label>Your RSS feed (no Shorts)</label>
      <div class="feed-row">
        <input id="feedUrl" type="text" readonly />
        <button id="copyBtn" title="Copy to clipboard">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round"
               stroke-linejoin="round" width="18" height="18">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
          <span>Copy</span>
        </button>
      </div>
    </div>

    <div id="error" class="error hidden"></div>

    <p class="explainer">
      Uses YouTube's hidden RSS feed and swaps the
      <code>UC…</code> channel ID for the <code>UULF…</code> playlist ID,
      which excludes Shorts.
    </p>
  </div>

  <script src="app.js"></script>
</body>
</html>
